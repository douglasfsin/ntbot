version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ntbot
      POSTGRES_USER: ntbot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ntbot"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  ntbot-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.Api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8081
      ConnectionStrings__DefaultConnection: Host=postgres;Database=ntbot;Username=ntbot;Password=${POSTGRES_PASSWORD:-devpassword}
      DATABASE_URL: Host=postgres;Database=ntbot;Username=ntbot;Password=${POSTGRES_PASSWORD:-devpassword}
      Redis__ConnectionString: redis:6379
    ports:
      - "5053:8081"
    depends_on:
      postgres:
        condition: service_healthy

  ntbot-web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.Web
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ApiSettings__BaseUrl: http://ntbot-api:8081
    ports:
      - "5001:8080"
    depends_on:
      - ntbot-api

volumes:
  pgdata:
